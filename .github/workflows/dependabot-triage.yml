name: Dependabot Triage

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.5.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const labels = new Set(['dependencies', 'automated', 'needs-triage']);
            const ecosystem = '${{ steps.metadata.outputs.package-ecosystem }}';
            const updateType = '${{ steps.metadata.outputs.update-type }}';
            if (ecosystem === 'github_actions') labels.add('ci');
            if (updateType.startsWith('version-update:semver-major')) labels.add('regression');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [...labels],
            });
