name: Validation Logic Report
description: Report mismatch in assessment validation or guard logic.
title: "[Validation Logic] "
labels:
  - validation-logic
  - needs-triage
body:
  - type: textarea
    id: expected
    attributes:
      label: Expected Validation Behavior
      description: Describe expected outcome (allow/block/error message).
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: Input Payload or Form Values
      description: Include step values, API payload, or branch/date combinations.
    validations:
      required: true
  - type: textarea
    id: route
    attributes:
      label: Route/Step
      description: e.g. Step 5 consultation date or /api/check-duplicate.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include screenshots/logs/network traces.
